<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>智能基金 - 量化推荐</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#2563eb;--pd:#1d4ed8;--pl:#dbeafe;--bg:#f1f5f9;--card:#fff;--t:#0f172a;--t2:#64748b;--b:#e2e8f0;--red:#ef4444;--grn:#16a34a;--org:#f59e0b;--r:12px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.hd{position:fixed;top:0;left:0;right:0;height:50px;padding-top:var(--st);background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:12px;z-index:100}
.hd h1{font-size:17px;font-weight:700}
.hd .sub{font-size:11px;color:var(--t2);font-weight:400}
.ib{width:34px;height:34px;border:none;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:transform .15s}
.ib:active{transform:scale(.88)}
.bar{position:fixed;bottom:0;left:0;right:0;height:56px;padding-bottom:var(--sb);background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b);display:flex;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--t2);cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;user-select:none}
.tab.on{color:var(--p);font-weight:600}
.tab .ti{font-size:20px}
.mn{padding-top:calc(50px + var(--st));padding-bottom:calc(56px + var(--sb));min-height:100vh}
.pg{display:none;padding:12px 12px 20px}.pg.on{display:block}
.sb{position:relative;margin-bottom:10px}
.sb input{width:100%;height:40px;border:1px solid var(--b);border-radius:20px;padding:0 16px 0 38px;font-size:14px;background:var(--card);outline:none;transition:border .2s}
.sb input:focus{border-color:var(--p)}
.sb::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;background:var(--card);color:var(--t2);border:1px solid var(--b);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.on{background:var(--p);color:#fff;border-color:var(--p)}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.top-row select{height:32px;border:1px solid var(--b);border-radius:8px;padding:0 8px;font-size:12px;background:var(--card);color:var(--t);outline:none}
.top-row .cnt{font-size:12px;color:var(--t2)}
.fl{display:flex;flex-direction:column;gap:8px}
.fc{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s;position:relative}
.fc:active{transform:scale(.98)}
.fc .r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.fc .nm{font-size:14px;font-weight:600;flex:1;margin-right:8px;line-height:1.3}
.fc .cd{font-size:11px;color:var(--t2);font-family:'SF Mono',Menlo,monospace}
.fc .r2{display:flex;gap:12px;align-items:baseline}
.fc .rt{font-size:22px;font-weight:700;font-family:'SF Mono',Menlo,monospace}
.fc .rt.up{color:var(--red)}.fc .rt.dn{color:var(--grn)}.fc .rt.ld{color:var(--t2);font-size:14px}
.fc .lb{font-size:11px;color:var(--t2)}
.fc .r3{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.fc .tg{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--pl);color:var(--p)}
.fc .tg.zq{background:#fef3c7;color:#92400e}.fc .tg.zs{background:#d1fae5;color:#065f46}
.fc .tg.qd{background:#ede9fe;color:#5b21b6}.fc .tg.fof{background:#fce7f3;color:#9d174d}
.fc .tg.hb{background:#e0e7ff;color:#3730a3}.fc .tg.qt{background:#f1f5f9;color:#475569}
.fc .acts{position:absolute;top:14px;right:12px;display:flex;gap:6px}
.fc .acts button{border:none;background:none;font-size:14px;cursor:pointer;padding:2px;opacity:.5;transition:opacity .2s}
.fc .acts button:hover,.fc .acts button.on{opacity:1}
.empty{text-align:center;padding:60px 20px;color:var(--t2)}
.empty .ei{font-size:48px;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--t)}
.ld{text-align:center;padding:40px;color:var(--t2)}
.ld .sp{width:32px;height:32px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.85);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.pbar{height:3px;background:var(--b);border-radius:2px;overflow:hidden;margin-bottom:8px}
.pbar .fill{height:100%;background:var(--p);transition:width .3s;border-radius:2px}
.dt{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;padding-top:var(--st)}
.dt .dh{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b);z-index:1}
.dt .dh button{border:none;background:none;font-size:20px;cursor:pointer;padding:4px}
.dt .dh h2{font-size:16px;font-weight:600;flex:1}
.dt .body{padding:16px}
.dt .info{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px}
.dt .info .nm{font-size:18px;font-weight:700;margin-bottom:4px}
.dt .info .meta{font-size:12px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap}
.dt .nav-box{text-align:center;background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:12px}
.dt .nav-box .val{font-size:36px;font-weight:700;font-family:'SF Mono',Menlo,monospace}
.dt .nav-box .date{font-size:12px;color:var(--t2);margin-top:4px}
.dt .nav-box .est{margin-top:8px;font-size:14px}
.dt .nav-box .est.up{color:var(--red)}.dt .nav-box .est.dn{color:var(--grn)}
.dt .acts2{display:flex;gap:8px;margin-bottom:12px}
.dt .acts2 button{flex:1;height:40px;border:1px solid var(--b);border-radius:8px;background:var(--card);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.dt .acts2 button.on{background:var(--p);color:#fff;border-color:var(--p)}
.dt .acts2 button:active{transform:scale(.96)}
.dt .chart-box{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px}
.dt .chart-box h3{font-size:14px;font-weight:600;margin-bottom:12px}
.dt .chart-box canvas{width:100%!important;height:200px!important}
.dt .stats{background:var(--card);border-radius:var(--r);padding:16px}
.dt .stats h3{font-size:14px;font-weight:600;margin-bottom:12px}
.dt .sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dt .si{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.dt .si .sv{font-size:18px;font-weight:700;font-family:'SF Mono',Menlo,monospace}
.dt .si .sl{font-size:11px;color:var(--t2);margin-top:2px}
.cmp-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cmp-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;background:var(--p);color:#fff;font-size:12px}
.cmp-tag button{border:none;background:rgba(255,255,255,.3);color:#fff;width:18px;height:18px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cmp-empty{text-align:center;padding:40px;color:var(--t2)}
.cmp-table{background:var(--card);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.cmp-table table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{background:var(--bg);padding:10px 8px;text-align:left;font-weight:600;white-space:nowrap}
.cmp-table td{padding:10px 8px;border-top:1px solid var(--b);white-space:nowrap}
.cmp-table .up{color:var(--red)}.cmp-table .dn{color:var(--grn)}
.cmp-chart{background:var(--card);border-radius:var(--r);padding:16px;margin-top:12px}
.cmp-chart canvas{width:100%!important;height:250px!important}
.pf-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pf-card .pi{flex:1}.pf-card .pi .nm{font-size:14px;font-weight:600}
.pf-card .pi .cd{font-size:11px;color:var(--t2);font-family:'SF Mono',Menlo,monospace}
.pf-card .pr{text-align:right}.pf-card .pr .amt{font-size:14px;font-weight:600;font-family:'SF Mono',Menlo,monospace}
.pf-card .pr .rt{font-size:12px;font-family:'SF Mono',Menlo,monospace}
.pf-card .pr .rt.up{color:var(--red)}.pf-card .pr .rt.dn{color:var(--grn)}
.pf-card .del{border:none;background:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px 8px}
.pf-add{display:flex;gap:8px;margin-bottom:12px}
.pf-add input{flex:1;height:40px;border:1px solid var(--b);border-radius:8px;padding:0 12px;font-size:13px;outline:none}
.pf-add input:focus{border-color:var(--p)}
.pf-add button{height:40px;padding:0 16px;border:none;border-radius:8px;background:var(--p);color:#fff;font-size:13px;cursor:pointer;white-space:nowrap}
.pf-sum{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px}
.pf-sum .row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.pf-sum .row:last-child{margin-bottom:0}
.pf-sum .v{font-weight:600;font-family:'SF Mono',Menlo,monospace}
.an-sel{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.an-sel select{flex:1;min-width:120px;height:40px;border:1px solid var(--b);border-radius:8px;padding:0 10px;font-size:13px;background:var(--card);outline:none}
.an-sel button{height:40px;padding:0 20px;border:none;border-radius:8px;background:var(--p);color:#fff;font-size:13px;cursor:pointer}
.an-sel button:disabled{opacity:.5}
.an-res{background:var(--card);border-radius:var(--r);padding:16px}
.an-res h3{font-size:15px;font-weight:600;margin:16px 0 8px}
.an-res h3:first-child{margin-top:0}
.an-res p{font-size:13px;line-height:1.6;color:var(--t2)}
.an-res .score{font-size:48px;font-weight:800;text-align:center;margin:12px 0}
.an-res .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:4px}
.an-res .tag.g{background:#dcfce7;color:#166534}.an-res .tag.y{background:#fef9c3;color:#854d0e}.an-res .tag.r{background:#fee2e2;color:#991b1b}
.an-chart{background:var(--card);border-radius:var(--r);padding:16px;margin-top:12px}
.an-chart canvas{width:100%!important;height:200px!important}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--r);padding:24px;width:90%;max-width:360px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;height:40px;border:1px solid var(--b);border-radius:8px;padding:0 12px;font-size:14px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--p)}
.modal .btns{display:flex;gap:8px}
.modal .btns button{flex:1;height:40px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid var(--b)}
.modal .btns .ok{background:var(--p);color:#fff;border-color:var(--p)}
.modal .btns .cc{background:var(--card)}
/* Recommendation page */
.rec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rec-hd h2{font-size:16px;font-weight:700}
.rec-hd .regime{font-size:12px;padding:3px 8px;border-radius:4px;font-weight:600}
.rec-hd .regime.bull{background:#dcfce7;color:#166534}
.rec-hd .regime.bear{background:#fee2e2;color:#991b1b}
.rec-hd .regime.side{background:#fef9c3;color:#854d0e}
.rec-hd .regime.ld{background:#f1f5f9;color:#64748b}
.rec-sub{font-size:12px;color:var(--t2);margin-bottom:12px}
.rc{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s;position:relative}
.rc:active{transform:scale(.98)}
.rc .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rc .rank{font-size:13px;font-weight:700;color:var(--p);min-width:28px}
.rc .info{flex:1;margin:0 10px}
.rc .info .nm{font-size:14px;font-weight:600;line-height:1.3}
.rc .info .cd{font-size:11px;color:var(--t2);font-family:'SF Mono',Menlo,monospace}
.rc .idx{font-size:32px;font-weight:800;font-family:'SF Mono',Menlo,monospace;min-width:52px;text-align:right}
.rc .idx.hi{color:var(--grn)}.rc .idx.md{color:var(--org)}.rc .idx.lo{color:var(--red)}
.rc .factors{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.rc .ft{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--t2)}
.rc .ft b{color:var(--t)}
.rc .reason{font-size:11px;color:var(--t2);line-height:1.4}
.rc .acts{position:absolute;top:14px;right:12px;display:flex;gap:6px}
.rc .acts button{border:none;background:none;font-size:14px;cursor:pointer;padding:2px;opacity:.5}
.rc .acts button:hover,.rc .acts button.on{opacity:1}
</style>
</head>
<body>
<div class="hd">
  <div><h1>📊 智能基金</h1><div class="sub" id="updateTime"></div></div>
  <button class="ib" onclick="loadAllFunds()" title="刷新">🔄</button>
</div>
<div class="mn">
  <div class="pg on" id="pgScreen">
    <div class="sb"><input id="searchInput" placeholder="搜索基金名称/代码/拼音" oninput="debounceSearch()"></div>
    <div class="chips" id="chips"></div>
    <div class="pbar" id="rtProgress" style="display:none"><div class="fill" id="rtFill" style="width:0%"></div></div>
    <div class="top-row">
      <select id="sortSel" onchange="applyFilters()">
        <option value="nm">名称</option>
        <option value="gz">今日涨跌幅</option>
        <option value="jz">最新净值</option>
      </select>
      <span class="cnt" id="fundCount"></span>
    </div>
    <div class="fl" id="fundList"><div class="ld"><div class="sp"></div>正在加载全量基金数据库...</div></div>
  </div>
  <div class="pg" id="pgRecommend">
    <div class="rec-hd"><h2>🏆 量化推荐</h2><button class="ib" onclick="runRecommendation()" title="刷新推荐" style="width:auto;padding:0 12px;font-size:12px;height:30px">🔄</button></div>
    <div id="regimeTag"></div>
    <div class="rec-sub" id="recSub">基于9个量化因子综合评分，数据每日更新</div>
    <div class="pbar" id="recProgress" style="display:none"><div class="fill" id="recFill" style="width:0%"></div></div>
    <div class="chips" id="recChips"></div>
    <div class="fl" id="recList"><div class="ld"><div class="sp"></div>等待分析...</div></div>
  </div>
  <div class="pg" id="pgCompare">
    <div class="cmp-tags" id="cmpTags"></div>
    <div id="cmpBody"><div class="cmp-empty">从筛选页添加基金到对比列表<br><br>点击基金卡片上的 ⚖️ 按钮</div></div>
  </div>
  <div class="pg" id="pgPortfolio">
    <div class="pf-add">
      <input id="holdCode" placeholder="输入基金代码">
      <input id="holdAmt" placeholder="金额" type="number" style="max-width:100px">
      <button onclick="addHoldingByCode()">添加</button>
    </div>
    <div id="pfBody"></div>
  </div>
  <div class="pg" id="pgAnalysis">
    <div class="an-sel">
      <select id="anCode"></select>
      <button onclick="runAnalysis()" id="anBtn">开始分析</button>
    </div>
    <div id="anBody"><div class="empty"><div class="ei">📈</div><h3>选择基金开始分析</h3><p>从下拉菜单选择一只基金</p></div></div>
  </div>
</div>
<div class="bar">
  <div class="tab on" data-pg="pgScreen" onclick="showPage('pgScreen')"><span class="ti">📊</span>筛选</div>
  <div class="tab" data-pg="pgRecommend" onclick="showPage('pgRecommend')"><span class="ti">🏆</span>推荐</div>
  <div class="tab" data-pg="pgCompare" onclick="showPage('pgCompare')"><span class="ti">⚖️</span>对比</div>
  <div class="tab" data-pg="pgPortfolio" onclick="showPage('pgPortfolio')"><span class="ti">💰</span>持仓</div>
  <div class="tab" data-pg="pgAnalysis" onclick="showPage('pgAnalysis')"><span class="ti">📈</span>分析</div>
</div>
<div class="toast" id="toast"></div>
<div id="detailPage"></div>
<div id="modalWrap"></div>
<script>

var rtLoading={};
var rtTotal=0;
var filtered=[];
var recResults=[];
var recType='all';
var marketRegime='unknown';
var state={
  type:'all',search:'',sort:'nm',page:1,perPage:20,

// ===== UTILS =====
function $(id){return document.getElementById(id)}
function fmt(v,d){d=d||4;return v==null||isNaN(v)?'--':Number(v).toFixed(d)}
function fmtPct(v){if(v==null||isNaN(v))return'--';var s=Number(v).toFixed(2);return(v>=0?'+':'')+s+'%'}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

// ===== JSONP QUEUE =====
var jq=[],jr=false;
function loadRT(code,cb){
  if(rtCache[code]){cb(rtCache[code]);return}
  if(rtLoading[code]){var w=setInterval(function(){if(rtCache[code]){clearInterval(w);cb(rtCache[code])}},50);return}
  jq.push({code:code,cb:cb});
  if(!jr)pjq();
}
function pjq(){
  if(jq.length===0){jr=false;return}
  jr=true;var item=jq.shift();rtLoading[item.code]=true;
  window.jsonpgz=function(data){
    delete rtLoading[item.code];
    if(data){rtCache[item.code]={gsz:parseFloat(data.gsz)||0,gszzl:parseFloat(data.gszzl)||0,dwjz:parseFloat(data.dwjz)||0,jzrq:data.jzrq||'',gztime:data.gztime||'',name:data.name||''};rtTotal++}
    item.cb(rtCache[item.code]||null);setTimeout(pjq,20);
  };
  var s=document.createElement('script');
  s.src='https://fundgz.1234567.com.cn/js/'+item.code+'.js?rt='+Date.now();
  s.onerror=function(){delete rtLoading[item.code];item.cb(null);s.remove();setTimeout(pjq,20)};
  s.onload=function(){s.remove()};
  document.head.appendChild(s);
}

// ===== LOAD DATABASE =====
function loadDatabase(){
  $('fundList').innerHTML='<div class="ld"><div class="sp"></div>正在加载全量基金数据库...</div>';
  var s=document.createElement('script');
  s.src='https://fund.eastmoney.com/js/fundcode_search.js';
  s.onload=function(){
    try{
      if(typeof r!=='undefined'&&Array.isArray(r)){
        fundDB=[];
        for(var i=0;i<r.length;i++){
          var item=r[i];if(!item||!item[0]||item[0].length!==6||!item[2])continue;
          fundDB.push({code:item[0],pinyin:(item[1]||'').toLowerCase(),name:item[2],typeName:item[3]||'',type:classifyType(item[3])});
        }
        $('updateTime').textContent='共 '+fundDB.length+' 只基金';
        applyFilters();
      }else{$('fundList').innerHTML='<div class="empty"><div class="ei">❌</div><h3>数据库加载失败</h3></div>'}
    }catch(e){$('fundList').innerHTML='<div class="empty"><div class="ei">❌</div><h3>解析失败</h3></div>'}
  };
  s.onerror=function(){$('fundList').innerHTML='<div class="empty"><div class="ei">❌</div><h3>网络错误</h3></div>'};
  document.head.appendChild(s);
}

// ===== BACKGROUND RT =====
var bgIdx=0,bgRunning=false;
function startBgRT(){$('rtProgress').style.display='block';bgIdx=0;bgRunning=true;bgBatch()}
function bgBatch(){
  if(!bgRunning)return;var codes=[];
  for(var i=0;i<filtered.length&&codes.length<5;i++){var c=filtered[bgIdx];if(c&&!rtCache[c]&&!rtLoading[c])codes.push(c);bgIdx=(bgIdx+1)%filtered.length}
  if(codes.length===0){bgRunning=false;$('rtProgress').style.display='none';return}
  var pending=codes.length;
  codes.forEach(function(code){loadRT(code,function(){pending--;if(pending===0){$('rtFill').style.width=Math.min(100,Math.round(rtTotal/Math.min(filtered.length,500)*100))+'%';if(state.sort==='gz')renderList();setTimeout(bgBatch,50)}})});
}

function loadPageRT(){
  var start=(state.page-1)*state.perPage,end=Math.min(start+state.perPage,filtered.length);
  for(var i=start;i<end;i++){var code=filtered[i];if(code&&!rtCache[code]&&!rtLoading[code]){(function(c){loadRT(c,function(d){if(d)updateCard(c)})})(code)}}
}
function updateCard(code){
  var el=document.getElementById('fc-'+code);if(!el||!rtCache[code])return;var d=rtCache[code];var up=d.gszzl>=0;
  var rtEl=el.querySelector('.rt');if(rtEl){rtEl.textContent=fmtPct(d.gszzl);rtEl.className='rt '+(up?'up':'dn')}
  var lbEl=el.querySelector('.r2 .lb');if(lbEl)lbEl.textContent='估值 '+fmt(d.gsz);
  var infoEl=el.querySelector('.r3 .lb:last-child');if(infoEl)infoEl.textContent='净值 '+fmt(d.dwjz)+' · '+d.jzrq;
}

// ===== FILTERS =====
function renderChips(){$('chips').innerHTML=TYPE_CHIPS.map(function(t){return '<div class="chip'+(state.type===t.k?' on':'')+'" onclick="setType(\''+t.k+'\')">'+t.l+'</div>'}).join('')}
function setType(t){state.type=t;state.page=1;renderChips();applyFilters();startBgRT()}
function applyFilters(){
  var list=fundDB.slice();
  if(state.type!=='all')list=list.filter(function(f){return f.type===state.type});
  if(state.search){var q=state.search.toLowerCase();list=list.filter(function(f){return f.name.toLowerCase().indexOf(q)>-1||f.code.indexOf(q)>-1||f.pinyin.indexOf(q)>-1})}
  var s=state.sort;
  if(s==='gz'){list.sort(function(a,b){var ra=rtCache[a.code]?rtCache[a.code].gszzl:-999;var rb=rtCache[b.code]?rtCache[b.code].gszzl:-999;return Math.abs(rb)-Math.abs(ra)})}
  else if(s==='jz'){list.sort(function(a,b){return(rtCache[b.code]?rtCache[b.code].dwjz:0)-(rtCache[a.code]?rtCache[a.code].dwjz:0)})}
  else{list.sort(function(a,b){return a.name.localeCompare(b.name,'zh')})}
  filtered=list.map(function(f){return f.code});
  $('fundCount').textContent='共 '+list.length+' 只';state.page=1;renderList();loadPageRT();
}
function debounceSearch(){clearTimeout(state._st);state._st=setTimeout(function(){state.search=$('searchInput').value.trim();applyFilters();startBgRT()},300)}

// ===== RENDER LIST =====
function renderList(){
  var start=(state.page-1)*state.perPage,end=Math.min(start+state.perPage,filtered.length),page=filtered.slice(start,end);
  if(page.length===0){$('fundList').innerHTML='<div class="empty"><div class="ei">🔍</div><h3>没有找到基金</h3></div>';return}
  var html='';
  for(var i=0;i<page.length;i++){
    var code=page[i],f=null;for(var j=0;j<fundDB.length;j++){if(fundDB[j].code===code){f=fundDB[j];break}}if(!f)continue;
    var d=rtCache[code],tc=TYPE_CLS[f.type]||'qt',isFav=state.favs.indexOf(code)>-1,isCmp=state.compare.indexOf(code)>-1,hasRT=!!d,up=hasRT&&d.gszzl>=0,cls=hasRT?(up?'up':'dn'):'ld';
    html+='<div class="fc" id="fc-'+code+'" onclick="showDetail(\''+code+'\')"><div class="r1"><div><div class="nm">'+f.name+'</div><div class="cd">'+f.code+'</div></div><div class="acts"><button class="'+(isFav?'on':'')+'" onclick="event.stopPropagation();toggleFav(\''+code+'\')">'+(isFav?'❤️':'🤍')+'</button><button class="'+(isCmp?'on':'')+'" onclick="event.stopPropagation();addToCompare(\''+code+'\')">⚖️</button></div></div><div class="r2"><span class="lb">'+(hasRT?'估值 '+fmt(d.gsz):'加载中...')+'</span><span class="rt '+cls+'">'+(hasRT?fmtPct(d.gszzl):'--')+'</span></div><div class="r3"><span class="tg '+tc+'">'+(TYPE_MAP[f.type]||f.typeName||f.type)+'</span><span class="lb">'+(hasRT?'净值 '+fmt(d.dwjz)+' · '+d.jzrq:f.typeName||'')+'</span></div></div>';
  }
  var tp=Math.ceil(filtered.length/state.perPage);
  if(tp>1){html+='<div style="display:flex;justify-content:center;gap:8px;margin-top:16px">';if(state.page>1)html+='<button style="padding:6px 16px;border:1px solid var(--b);border-radius:8px;background:var(--card);cursor:pointer" onclick="goPage('+(state.page-1)+')">上一页</button>';html+='<span style="padding:6px 12px;font-size:13px;color:var(--t2)">'+state.page+'/'+tp+'</span>';if(state.page<tp)html+='<button style="padding:6px 16px;border:1px solid var(--b);border-radius:8px;background:var(--card);cursor:pointer" onclick="goPage('+(state.page+1)+')">下一页</button>';html+='</div>'}

  dp.style.display='block';document.body.style.overflow='hidden';

}
function closeDetail(){$('detailPage').style.display='none';document.body.style.overflow='';if(state.charts.detail){state.charts.detail.destroy();state.charts.detail=null}}
function loadDetailNav(code){
  fetchNav(code).then(function(list){
    if(!list||list.length===0){$('detailStats').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--t2);padding:20px">暂无历史数据</div>';return}
    var vals=list;
    var labels=[];for(var i=0;i<vals.length;i++){labels.push('')};
    var ctx=$('detailChart');if(state.charts.detail)state.charts.detail.destroy();
    state.charts.detail=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'净值',data:vals,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.1)',fill:true,tension:0.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxTicksLimit:8},grid:{display:false}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10}}}}}});
    var rets=[];for(var i=1;i<vals.length;i++){rets.push((vals[i]-vals[i-1])/vals[i-1]*100)}
    var avgR=rets.length>0?rets.reduce(function(a,b){return a+b},0)/rets.length:0;
    var posR=rets.filter(function(r){return r>0}).length;var winRate=rets.length>0?(posR/rets.length*100):0;
    var mx=vals[0],maxDD=0;for(var i=1;i<vals.length;i++){if(vals[i]>mx)mx=vals[i];var dd2=(mx-vals[i])/mx*100;if(dd2>maxDD)maxDD=dd2}
    var totalR=(vals[vals.length-1]-vals[0])/vals[0]*100;
    var vari=rets.length>0?rets.reduce(function(s,r){return s+Math.pow(r-avgR,2)},0)/rets.length:0;var stdDev=Math.sqrt(vari);
    var sharpe=stdDev>0?(avgR/stdDev*Math.sqrt(252)):0;
    $('detailStats').innerHTML='<div class="si"><div class="sv" style="color:'+(totalR>=0?'var(--red)':'var(--grn)')+'">'+fmtPct(totalR)+'</div><div class="sl">区间收益</div></div><div class="si"><div class="sv" style="color:'+(avgR>=0?'var(--red)':'var(--grn)')+'">'+fmtPct(avgR)+'</div><div class="sl">日均收益</div></div><div class="si"><div class="sv">'+fmt(winRate,1)+'%</div><div class="sl">胜率</div></div><div class="si"><div class="sv" style="color:var(--red)">'+fmt(maxDD,1)+'%</div><div class="sl">最大回撤</div></div><div class="si"><div class="sv">'+fmt(stdDev,2)+'%</div><div class="sl">日波动率</div></div><div class="si"><div class="sv">'+fmt(sharpe,2)+'</div><div class="sl">夏普比率</div></div>';
  }).catch(function(){$('detailStats').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--t2);padding:20px">数据加载失败</div>'});
}

// ===== QUANTITATIVE ENGINE =====
var _navCbId=0;
function fetchNav(code){
  return new Promise(function(resolve){
    var cbName='_fnav_'+(++_navCbId)+'_'+code+'_'+Date.now();
    var resolved=false;
    window[cbName]=function(d){
      if(resolved)return;resolved=true;
      try{delete window[cbName]}catch(e){}
      var el=document.getElementById('s_'+cbName);if(el)el.remove();
      var list=(d.Data&&d.Data.LSJZList)||[];
      if(list.length<10){resolve(null);return}
      list.reverse();resolve(list.map(function(x){return parseFloat(x.DWJZ)}));
    };
    var s=document.createElement('script');
    s.id='s_'+cbName;
    s.src='https://api.fund.eastmoney.com/f10/lsjz?callback='+cbName+'&fundCode='+code+'&pageIndex=1&pageSize=120&_t='+Date.now();
    s.onerror=function(){if(resolved)return;resolved=true;try{delete window[cbName]}catch(e){}s.remove();resolve(null)};
    document.head.appendChild(s);
    setTimeout(function(){if(!resolved){resolved=true;try{delete window[cbName]}catch(e){}var el=document.getElementById('s_'+cbName);if(el)el.remove();resolve(null)}},15000);
  });
}

function calcFactors(vals){
  if(!vals||vals.length<20)return null;
  var n=vals.length;
  // Daily returns
  var rets=[];for(var i=1;i<n;i++){rets.push((vals[i]-vals[i-1])/vals[i-1]*100)}
  var avgR=rets.reduce(function(a,b){return a+b},0)/rets.length;
  var vari=rets.reduce(function(s,r){return s+Math.pow(r-avgR,2)},0)/rets.length;
  var stdDev=Math.sqrt(vari);
  var annStd=stdDev*Math.sqrt(252);
  var sharpe=stdDev>0?(avgR/stdDev*Math.sqrt(252)):0;

  // 1. Momentum (1m, 3m, 6m)
  var m1=n>22?((vals[n-1]-vals[n-22])/vals[n-22]*100):0;
  var m3=n>66?((vals[n-1]-vals[Math.max(0,n-66)])/vals[Math.max(0,n-66)]*100):0;
  var m6=n>132?((vals[n-1]-vals[Math.max(0,n-132)])/vals[Math.max(0,n-132)]*100):m3;
  var momentum=(m1*0.4+m3*0.35+m6*0.25);

  // 2. Mean reversion
  var recent20=rets.slice(-20);var recent20avg=recent20.reduce(function(a,b){return a+b},0)/recent20.length;
  var older=rets.slice(0,-20);var olderAvg=older.length>0?older.reduce(function(a,b){return a+b},0)/older.length:0;
  var meanRev=olderAvg-recent20avg; // positive = recently dropped more = buy signal

  // 3. Risk-adjusted return (Sharpe already calculated)
  var riskAdj=sharpe;

  // 4. Volatility control (lower is better)
  var vol=annStd;

  // 5. Trend strength (MA crossover)
  var ma20=n>20?vals.slice(-20).reduce(function(a,b){return a+b},0)/20:vals[n-1];
  var ma60=n>60?vals.slice(-60).reduce(function(a,b){return a+b},0)/60:ma20;
  var trendScore=0;
  if(vals[n-1]>ma20)trendScore+=50;if(vals[n-1]>ma60)trendScore+=30;
  if(ma20>ma60)trendScore+=20;

  // 6. Max drawdown
  var mx=vals[0],maxDD=0;for(var i=1;i<n;i++){if(vals[i]>mx)mx=vals[i];var dd=(mx-vals[i])/mx*100;if(dd>maxDD)maxDD=dd}

  // 7. Drawdown recovery
  var inDD=false,ddStart=0,recoveryDays=[];
  for(var i=1;i<n;i++){
    if(!inDD&&vals[i]<vals[i-1]){inDD=true;ddStart=i}
    if(inDD&&vals[i]>=vals[ddStart]){recoveryDays.push(i-ddStart);inDD=false}
  }
  var avgRecovery=recoveryDays.length>0?recoveryDays.reduce(function(a,b){return a+b},0)/recoveryDays.length:999;

  // 8. Calmar ratio
  var annReturn=Math.pow(vals[n-1]/vals[0],252/Math.max(1,rets.length))-1;
  var calmar=maxDD>0?(annReturn*100/maxDD):0;

  // 9. Win rate
  var winRate=rets.filter(function(r){return r>0}).length/rets.length*100;

  return {
    momentum:momentum,m1:m1,m3:m3,m6:m6,
    meanRev:meanRev,riskAdj:riskAdj,sharpe:sharpe,
    vol:vol,maxDD:maxDD,trend:trendScore,
    avgRecovery:avgRecovery,calmar:calmar,winRate:winRate,
    annReturn:annReturn*100
  };
}

function scoreFactor(val,best,worst){
  if(worst===best)return 50;
  return clamp(Math.round((val-worst)/(best-worst)*100),0,100);
}

function calcCompositeScore(factors,regime){
  if(!factors)return 0;
  var sMomentum=scoreFactor(factors.momentum,30,-30);
  var sRiskAdj=scoreFactor(factors.sharpe,3,-1);
  var sTrend=scoreFactor(factors.trend,100,0);
  var sMeanRev=scoreFactor(factors.meanRev,3,-3);
  var sVol=scoreFactor(-factors.vol,-5,-40); // lower vol = higher score
  var sDD=scoreFactor(-factors.maxDD,-2,-50); // lower DD = higher score
  var sRecovery=scoreFactor(-factors.avgRecovery,-5,-60); // faster = higher score
  var sCalmar=scoreFactor(factors.calmar,3,-1);
  var sWinRate=scoreFactor(factors.winRate,60,35);

  var w;
  if(regime==='bull'){w={m:0.30,ra:0.15,t:0.20,mr:0.10,v:0.05,dd:0.05,rec:0.05,cal:0.05,wr:0.05}}
  else if(regime==='bear'){w={m:0.10,ra:0.20,t:0.05,mr:0.15,v:0.15,dd:0.15,rec:0.10,cal:0.05,wr:0.05}}
  else{w={m:0.20,ra:0.20,t:0.15,mr:0.15,v:0.10,dd:0.08,rec:0.05,cal:0.04,wr:0.03}}

  var total=Math.round(sMomentum*w.m+sRiskAdj*w.ra+sTrend*w.t+sMeanRev*w.mr+sVol*w.v+sDD*w.dd+sRecovery*w.rec+sCalmar*w.cal+sWinRate*w.wr);
  return {
    total:total,breakdown:{
      momentum:sMomentum,riskAdj:sRiskAdj,trend:sTrend,meanRev:sMeanRev,
      vol:sVol,drawdown:sDD,recovery:sRecovery,calmar:sCalmar,winRate:sWinRate
    }
  };
}

function detectRegime(vals){
  if(!vals||vals.length<60)return'side';
  var n=vals.length;
  var ret60=(vals[n-1]-vals[Math.max(0,n-60)])/vals[Math.max(0,n-60)]*100;
  var ma20=vals.slice(-20).reduce(function(a,b){return a+b},0)/20;
  var ma60=vals.slice(-60).reduce(function(a,b){return a+b},0)/60;
  if(ret60>5&&vals[n-1]>ma20&&vals[n-1]>ma60)return'bull';
  if(ret60<-5&&vals[n-1]<ma20&&vals[n-1]<ma60)return'bear';
  return'side';
}

// ===== RECOMMENDATION ENGINE =====
function startRecAnalysis(codes){
  var total=codes.length;var done=0;var idx=0;var CONCURRENCY=3;
  function processNext(){
    while(idx<total && idx-done<CONCURRENCY){
      (function(code){
        fetchNav(code).then(function(vals){
          if(vals){var factors=calcFactors(vals);if(factors){var score=calcCompositeScore(factors,marketRegime);var f=null;for(var j=0;j<fundDB.length;j++){if(fundDB[j].code===code){f=fundDB[j];break}}var d=rtCache[code];recResults.push({code:code,name:f?f.name:code,type:f?f.type:'qt',typeName:f?f.typeName:'',score:score,factors:factors,dwjz:d?d.dwjz:null,gszzl:d?d.gszzl:null,jzrq:d?d.jzrq:''})}}
          done++;$('recFill').style.width=Math.round(done/total*100)+'%';
          if(done%10===0)renderRecList();
          processNext();
        }).catch(function(){done++;$('recFill').style.width=Math.round(done/total*100)+'%';processNext()});
      })(codes[idx++]);
    }
    if(done>=total)finishRec();
  }
  processNext();
}

    var regimeCls={bull:'bull',bear:'bear',side:'side'};

    $('recSub').textContent='基于9个量化因子 · '+(marketRegime==='bull'?'牛市':marketRegime==='bear'?'熊市':'震荡市')+'环境 · 数据每日更新';
    // Step 2: analyze funds

    $('recList').innerHTML='<div class="ld"><div class="sp"></div>正在分析 '+codes.length+' 只基金...</div>';
    startRecAnalysis(codes);
  });
}

function finishRec(){
  $('recProgress').style.display='none';
  recResults.sort(function(a,b){return b.score.total-a.score.total});
  renderRecList();
  toast('推荐分析完成');
}

function renderRecChips(){
  $('recChips').innerHTML=TYPE_CHIPS.map(function(t){return '<div class="chip'+(recType===t.k?' on':'')+'" onclick="setRecType(\''+t.k+'\')">'+t.l+'</div>'}).join('');
}
function setRecType(t){recType=t;renderRecChips();renderRecList()}

function renderRecList(){
  var list=recResults.slice();
  if(recType!=='all')list=list.filter(function(r){return r.type===recType});
  list.sort(function(a,b){return b.score.total-a.score.total});
  if(list.length===0){$('recList').innerHTML='<div class="empty"><div class="ei">🏆</div><h3>暂无推荐数据</h3><p>请点击刷新按钮开始分析</p></div>';return}

  var html='';
  for(var i=0;i<Math.min(list.length,50);i++){
    var r=list[i];
    var cls=r.score.total>=70?'hi':r.score.total>=50?'md':'lo';
    var isFav=state.favs.indexOf(r.code)>-1;
    var bd=r.score.breakdown;
    var reason=genReason(r);
    html+='<div class="rc" onclick="showDetail(\''+r.code+'\')"><div class="top"><div class="rank">#'+(i+1)+'</div><div class="info"><div class="nm">'+r.name+'</div><div class="cd">'+r.code+' · '+(TYPE_MAP[r.type]||r.typeName)+'</div></div><div class="acts"><button class="'+(isFav?'on':'')+'" onclick="event.stopPropagation();toggleFav(\''+r.code+'\');renderRecList()">'+(isFav?'❤️':'🤍')+'</button></div><div class="idx '+cls+'">'+r.score.total+'</div></div><div class="factors"><span class="ft">动量<b>'+bd.momentum+'</b></span><span class="ft">夏普<b>'+bd.riskAdj+'</b></span><span class="ft">趋势<b>'+bd.trend+'</b></span><span class="ft">回撤<b>'+bd.drawdown+'</b></span><span class="ft">胜率<b>'+bd.winRate+'</b></span></div><div class="reason">'+reason+'</div></div>';
  }
  $('recList').innerHTML=html;
}

function genReason(r){
  var f=r.factors,bd=r.score.breakdown,reasons=[];
  if(bd.momentum>=70)reasons.push('近期动量强劲');
  else if(bd.momentum<=30)reasons.push('近期动量偏弱');
  if(bd.riskAdj>=70)reasons.push('风险收益比优秀');
  if(bd.trend>=70)reasons.push('趋势确立');
  else if(bd.trend<=30)reasons.push('趋势不明朗');
  if(bd.drawdown>=70)reasons.push('回撤控制良好');
  else if(bd.drawdown<=30)reasons.push('回撤风险偏高');
  if(bd.winRate>=70)reasons.push('日胜率高');
  if(bd.meanRev>=70)reasons.push('超跌反弹信号');
  if(reasons.length===0)reasons.push('综合表现中等');
  var perf='';
  if(r.gszzl!=null)perf='今日'+fmtPct(r.gszzl)+' · ';
  if(f.m1!=0)perf+='近1月'+fmtPct(f.m1);
  return perf+' | '+reasons.slice(0,3).join('，');
}

// ===== ANALYSIS =====
function updateAnSelect(){
  var sel=$('anCode');var prev=sel.value;var codes=[];var seen={};
  state.holdings.forEach(function(h){if(!seen[h.code]){seen[h.code]=1;codes.push(h.code)}});
  recResults.forEach(function(r){if(!seen[r.code]){seen[r.code]=1;codes.push(r.code)}});
  for(var k in rtCache){if(!seen[k]){seen[k]=1;codes.push(k)}}
  for(var i=0;i<Math.min(fundDB.length,200);i++){if(!seen[fundDB[i].code]){seen[fundDB[i].code]=1;codes.push(fundDB[i].code)}}
  sel.innerHTML=codes.map(function(code){var f=null;for(var j=0;j<fundDB.length;j++){if(fundDB[j].code===code){f=fundDB[j];break}}return f?'<option value="'+code+'">'+f.name+' ('+code+')</option>':''}).join('');
  if(prev)sel.value=prev;
}

      html+='<h3>💡 建议</h3><p>'+(score.total>=70?'该基金综合表现优秀，多因子评分靠前，建议重点关注。':score.total>=50?'该基金表现中等，建议结合自身风险偏好谨慎配置。':'该基金综合评分偏低，建议谨慎或分散投资。')+'</p><p style="margin-top:8px;color:var(--t2);font-size:12px">市场环境: '+(marketRegime==='bull'?'牛市':marketRegime==='bear'?'熊市':'震荡市')+' · 因子权重已自动调整</p></div>';
